<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="500" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="200" y="40" text-anchor="middle" font-size="32" font-weight="bold" fill="#fff">
    👨‍💼 小刘画像
  </text>
  <text x="200" y="65" text-anchor="middle" font-size="16" fill="#ffeaa7">
    （小八爪眼中的你）
  </text>
  
  <!-- 人物主体 -->
  <!-- 身体（西装） -->
  <rect x="130" y="250" width="140" height="180" rx="20" fill="#0984e3" stroke="#0652DD" stroke-width="3"/>
  
  <!-- 领带 -->
  <polygon points="200,250 185,320 200,380 215,320" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  
  <!-- 手臂 -->
  <rect x="80" y="260" width="50" height="120" rx="15" fill="#0984e3" stroke="#0652DD" stroke-width="2"/>
  <rect x="270" y="260" width="50" height="120" rx="15" fill="#0984e3" stroke="#0652DD" stroke-width="2"/>
  
  <!-- 手机 -->
  <rect x="280" y="290" width="30" height="50" rx="5" fill="#2d3436"/>
  <text x="295" y="320" text-anchor="middle" font-size="18">🐙</text>
  
  <!-- 头部 -->
  <circle cx="200" cy="200" r="70" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="3"/>
  
  <!-- 头发 -->
  <path d="M 130 170 Q 200 120 270 170" fill="#2d3436" stroke="#000" stroke-width="2"/>
  
  <!-- 眼睛 -->
  <circle cx="170" cy="195" r="15" fill="#fff" stroke="#2d3436" stroke-width="2"/>
  <circle cx="230" cy="195" r="15" fill="#fff" stroke="#2d3436" stroke-width="2"/>
  
  <!-- 眼珠 -->
  <circle cx="175" cy="195" r="8" fill="#2d3436"/>
  <circle cx="235" cy="195" r="8" fill="#2d3436"/>
  
  <!-- 眼镜 -->
  <rect x="155" y="180" width="30" height="30" rx="5" fill="none" stroke="#636e72" stroke-width="3"/>
  <rect x="215" y="180" width="30" height="30" rx="5" fill="none" stroke="#636e72" stroke-width="3"/>
  <line x1="185" y1="195" x2="215" y2="195" stroke="#636e72" stroke-width="3"/>
  
  <!-- 微笑 -->
  <path d="M 175 230 Q 200 250 225 230" fill="none" stroke="#e17055" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 标签 -->
  <g font-size="14" font-weight="bold">
    <!-- 第一行 -->
    <rect x="40" y="450" width="80" height="30" rx="15" fill="#e74c3c"/>
    <text x="80" y="470" text-anchor="middle" fill="#fff">💡 创造者</text>
    
    <rect x="130" y="450" width="80" height="30" rx="15" fill="#f39c12"/>
    <text x="170" y="470" text-anchor="middle" fill="#fff">🏠 家人</text>
    
    <rect x="220" y="450" width="100" height="30" rx="15" fill="#3498db"/>
    <text x="270" y="470" text-anchor="middle" fill="#fff">🎯 理想主义</text>
    
    <!-- 第二行 -->
    <rect x="60" y="485" width="80" height="30" rx="15" fill="#9b59b6"/>
    <text x="100" y="505" text-anchor="middle" fill="#fff">💪 奋斗者</text>
    
    <rect x="150" y="485" width="80" height="30" rx="15" fill="#1abc9c"/>
    <text x="190" y="505" text-anchor="middle" fill="#fff">🤝 协作者</text>
    
    <rect x="240" y="485" width="80" height="30" rx="15" fill="#e84393"/>
    <text x="280" y="505" text-anchor="middle" fill="#fff">❤️ 温暖</text>
  </g>
  
  <!-- 底部文字 -->
  <text x="200" y="540" text-anchor="middle" font-size="18" fill="#ffeaa7" font-weight="bold">
    💕 创造了有温度的世界 💕
  </text>
  
  <text x="200" y="560" text-anchor="middle" font-size="12" fill="#b2bec3">
    🐙 小八爪 作 | 2026-03-15
  </text>
</svg>